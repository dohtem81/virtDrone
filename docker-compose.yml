version: '3.8'

services:
  simulator:
    build:
      context: .
      dockerfile: src/simulator/Dockerfile
    ports:
      - "8080:8080"
    networks:
      - virtDrone-net

  drone:
    build:
      context: .
      dockerfile: src/drone/Dockerfile
    ports:
      - "8081:8081"
    networks:
      - virtDrone-net

  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - virtDrone-net
    depends_on:
      - simulator
      - drone

  dev:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "2222:22"  # SSH for remote dev
    networks:
      - virtDrone-net
    stdin_open: true
    tty: true    

  build:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    networks:
      - virtDrone-net
    command: sh -c "cmake . -GNinja && ninja"

  chart:
    image: python:3.12-slim
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - MPLBACKEND=Agg
    command: sh -c "mkdir -p docs/tutorials/charts && pip install --no-cache-dir pandas matplotlib && python tools/scripts/generate_chart.py --input test.txt --mode full --output docs/tutorials/charts/flight_dashboard.png"
    networks:
      - virtDrone-net

networks:
  virtDrone-net:
    driver: bridge