# Attitude Controller Configuration
# Controls yaw, pitch, and roll stabilization

attitude_controller:
  # PD gains for attitude control (RPM output per radian error)
  # Lower gains = smoother, slower response
  # Higher gains = faster, more aggressive response (risk of oscillation)
  
  # Yaw control (rotation around vertical axis)
  yaw_p_gain_rpm_per_rad: 200.0      # Proportional gain
  yaw_d_gain_rpm_per_rad_s: 50.0     # Derivative gain (damping)
  
  # Pitch control (forward/backward tilt)
  pitch_p_gain_rpm_per_rad: 250.0    # Proportional gain
  pitch_d_gain_rpm_per_rad_s: 60.0   # Derivative gain (damping)
  
  # Roll control (left/right tilt)
  roll_p_gain_rpm_per_rad: 250.0     # Proportional gain
  roll_d_gain_rpm_per_rad_s: 60.0    # Derivative gain (damping)
  
  # Target attitude (radians)
  target_yaw_rad: 0.0
  target_pitch_rad: 0.0
  target_roll_rad: 0.0
  
  # Saturation limits
  max_motor_rpm: 20000.0
  min_motor_rpm: 0.0
