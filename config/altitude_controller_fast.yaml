# Alternative Altitude Controller Configuration
# More aggressive control for faster response

altitude_controller:
  # Target altitude in meters
  target_altitude_m: 100.0
  
  # Altitude reference tracking parameters
  altitude_param_p: 3.0           # Higher P gain for faster tracking
  max_altitude_delta_mps: 10.0    # Allow faster altitude changes
  
  # RPM control parameters (PI controller)
  control_param_p: 1500.0          # Higher P gain
  control_param_i: 20.0           # Higher I gain
  control_param_d: 20.0            # Derivative gain
  enable_i_component: true        # Enable integral component
  enable_d_component: true       # Enable derivative component
  activation_error_band_m: 3.0    # I and D active only when |error| < this band
  
  # Hover RPM estimate
  neutral_rpm: 11400.0

  # XY position hold (always-on by default, independent of mission mode)
  position_hold_enabled: true
  position_hold_kp_pos: 1.5
  position_hold_kp_vel: 14.0
  position_hold_kd_vel: 3.0
  position_hold_max_velocity_mps: 25.0
  position_hold_max_tilt_rad: 1.3
