mission:
  name: "Hover and Move"
  description: "Take off, hover, move to waypoint, then land"
  version: "1.0"
  metadata:
    author: "virtDrone"
    created: "2026-03-03"
    max_duration_s: 180

  initial_conditions:
    altitude_m: 0.0
    position_enu_m:
      x: 0.0
      y: 0.0
    yaw_rad: 0.0
    battery_soc_percent: 100.0

  steps:
    - step_id: 1
      name: "Takeoff to 10m"
      action: "hover"
      target_altitude_m: 10.0
      advance_mode: "completion_based"
      timeout_s: 20.0
      completion_criteria:
        condition_type: "altitude_and_velocity"
        target_altitude_m: 10.0
        altitude_tolerance_m: 3.0
        max_velocity_mps: 0.3
        hold_duration_s: 1.0

    - step_id: 2
      name: "Hover 3 seconds"
      action: "hover"
      target_altitude_m: 10.0
      advance_mode: "time_based"
      duration_s: 3.0
      timeout_s: 5.0

    - step_id: 3
      name: "go to 20m"
      action: "hover"
      target_altitude_m: 20.0
      advance_mode: "completion_based"
      timeout_s: 20.0
      completion_criteria:
        condition_type: "altitude_and_velocity"
        target_altitude_m: 20.0
        altitude_tolerance_m: 3.0
        max_velocity_mps: 0.3
        hold_duration_s: 1.0

    - step_id: 4
      name: "Hover 3 seconds"
      action: "hover"
      target_altitude_m: 20.0
      advance_mode: "time_based"
      duration_s: 3.0
      timeout_s: 5.0

    - step_id: 5
      name: "Takeoff to 10m"
      action: "hover"
      target_altitude_m: 30.0
      advance_mode: "completion_based"
      timeout_s: 20.0
      completion_criteria:
        condition_type: "altitude_and_velocity"
        target_altitude_m: 30.0
        altitude_tolerance_m: 3.0
        max_velocity_mps: 0.3
        hold_duration_s: 1.0

    - step_id: 6
      name: "Hover 3 seconds"
      action: "hover"
      target_altitude_m: 30.0
      advance_mode: "time_based"
      duration_s: 3.0
      timeout_s: 5            

    - step_id: 7
      name: "Land"
      action: "land"
      descent_rate_mps: 1.5
      advance_mode: "completion_based"
      timeout_s: 30.0
      completion_criteria:
        condition_type: "landed"
        altitude_tolerance_m: 0.15
